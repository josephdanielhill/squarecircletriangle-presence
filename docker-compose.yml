version: '3.8'

services:
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    environment:
      - TZ=UTC
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - squarecircletriangle-network

  squarecircletriangle:
    build: .
    container_name: squarecircletriangle
    restart: unless-stopped
    environment:
      - TZ=UTC
    volumes:
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./assets:/usr/share/nginx/html/assets:ro
    networks:
      - squarecircletriangle-network
    expose:
      - "80"

networks:
  squarecircletriangle-network:
    driver: bridge
